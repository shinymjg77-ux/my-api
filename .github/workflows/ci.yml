name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend Smoke Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          APP_NAME=Personal API Admin
          ENVIRONMENT=ci
          DEBUG=false
          API_PREFIX=/api/v1
          SECRET_KEY=ci-secret-key-0123456789abcdef0123456789
          ENCRYPTION_KEY=x0Rr5xM7XjM2kP1XxP0cG7QxTq4n2mQhW1Qm0rF1R9k=
          ACCESS_TOKEN_EXPIRE_MINUTES=720
          ADMIN_COOKIE_NAME=admin_session
          COOKIE_SECURE=false
          COOKIE_SAMESITE=lax
          CORS_ORIGINS=["http://127.0.0.1:3000"]
          BOOTSTRAP_ADMIN_USERNAME=admin
          BOOTSTRAP_ADMIN_PASSWORD=change-this-in-ci
          DASHBOARD_WINDOW_DAYS=7
          LOG_PAGE_SIZE_DEFAULT=20
          LOG_PAGE_SIZE_MAX=100
          EOF

      - name: Import backend app
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          BACKEND_BASE_URL: http://127.0.0.1:8000
          BACKEND_API_PREFIX: /api/v1
        run: npm run build
